<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- daisy & tailwind css  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- external css  -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- navigation section -->
    <header>
      <nav class="px-3 py-5">
        <div class="mb-4">
          <h1 class="text-3xl font-bold">Job Application Tracker</h1>
        </div>
        <div class="flex justify-center items-center gap-4 mt-4">
          <div class="border border-base-300 rounded-xl p-5 w-full">
            <p class="text-lg">Total</p>
            <p class="text-2xl font-bold">8</p>
          </div>
          <div class="border border-base-300 rounded-xl p-5 w-full">
            <p class="text-lg">Interview</p>
            <p class="text-2xl text-success font-bold">0</p>
          </div>
          <div class="border border-base-300 rounded-xl p-5 w-full">
            <p class="text-lg">Rejected</p>
            <p class="text-2xl text-error font-bold">0</p>
          </div>
        </div>
      </nav>
    </header>
    <!-- script  -->
    <script src="./main.js"></script>
    <script src="tailwind.config.js"></script>
  </body>
</html>
